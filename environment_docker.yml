name: kilosort
channels:  
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11.*
  - pip
  - psutil
  - numpy
  - scipy
  - scikit-learn
  - tqdm
  - numba
  - faiss-cpu
  - libblas=*=*mkl
  - pytest
  - pyqt6
  - qtpy
  - pyqtgraph>=0.13.0
  # CUDA
  - nvidia-ml-py
  # GUI
  - matplotlib

